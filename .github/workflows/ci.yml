name: Phase 4 Release Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - release-*
  workflow_dispatch:
    inputs:
      gate:
        description: Select release gate level
        required: true
        default: release-candidate
        type: choice
        options:
          - release-candidate
          - formal-release

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://username:password@localhost:5432/presales_system
  JWT_SECRET: ci-phase-4-jwt-secret
  NEXT_PUBLIC_APP_URL: http://localhost:5000
  NEXT_PUBLIC_API_URL: http://localhost:5000/api
  DEV_TEST_SETUP_ENABLED: false
  TEST_SECRET: ci-phase-4-test-secret
  NODE_ENV: test

concurrency:
  group: phase-4-release-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run PR gate
        run: pnpm run verify:pr

  release-candidate:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.gate == 'release-candidate')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run release-candidate gate
        run: pnpm run verify:release-candidate

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-playwright
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  formal-release:
    if: startsWith(github.ref, 'refs/tags/release-') || (github.event_name == 'workflow_dispatch' && github.event.inputs.gate == 'formal-release')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run formal release gate
        run: pnpm run verify:release

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: formal-release-playwright
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore